<!DOCTYPE html>
<html lang="en">
<head>
	<title>Sign Up – SpaceRunner</title>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<a href="../index.html"><svg class="icons back" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512"><!--! Font Awesome Pro 6.4.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license (Commercial License) Copyright 2023 Fonticons, Inc. --><path d="M130 480c40.6 0 80.4-11 115.2-31.9L352 384l-224 0 0 96h2zM352 128L245.2 63.9C210.4 43 170.6 32 130 32h-2v96l224 0zM96 128l0-96H80C53.5 32 32 53.5 32 80v48h8c-22.1 0-40 17.9-40 40v16V328v16c0 22.1 17.9 40 40 40H32v48c0 26.5 21.5 48 48 48H96l0-96h8c26.2 0 49.4-12.6 64-32H456c69.3 0 135-22.7 179.2-81.6c6.4-8.5 6.4-20.3 0-28.8C591 182.7 525.3 160 456 160H168c-14.6-19.4-37.8-32-64-32l-8 0zM512 243.6v24.9c0 19.6-15.9 35.6-35.6 35.6c-2.5 0-4.4-2-4.4-4.4V212.4c0-2.5 2-4.4 4.4-4.4c19.6 0 35.6 15.9 35.6 35.6z"/></svg></a>
	<a href="login.html"><svg class="icons user" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 448 512"><!--! Font Awesome Pro 6.4.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license (Commercial License) Copyright 2023 Fonticons, Inc. --><path d="M370.7 96.1C346.1 39.5 289.7 0 224 0S101.9 39.5 77.3 96.1C60.9 97.5 48 111.2 48 128v64c0 16.8 12.9 30.5 29.3 31.9C101.9 280.5 158.3 320 224 320s122.1-39.5 146.7-96.1c16.4-1.4 29.3-15.1 29.3-31.9V128c0-16.8-12.9-30.5-29.3-31.9zM336 144v16c0 53-43 96-96 96H208c-53 0-96-43-96-96V144c0-26.5 21.5-48 48-48H288c26.5 0 48 21.5 48 48zM189.3 162.7l-6-21.2c-.9-3.3-3.9-5.5-7.3-5.5s-6.4 2.2-7.3 5.5l-6 21.2-21.2 6c-3.3 .9-5.5 3.9-5.5 7.3s2.2 6.4 5.5 7.3l21.2 6 6 21.2c.9 3.3 3.9 5.5 7.3 5.5s6.4-2.2 7.3-5.5l6-21.2 21.2-6c3.3-.9 5.5-3.9 5.5-7.3s-2.2-6.4-5.5-7.3l-21.2-6zM112.7 316.5C46.7 342.6 0 407 0 482.3C0 498.7 13.3 512 29.7 512H128V448c0-17.7 14.3-32 32-32H288c17.7 0 32 14.3 32 32v64l98.3 0c16.4 0 29.7-13.3 29.7-29.7c0-75.3-46.7-139.7-112.7-165.8C303.9 338.8 265.5 352 224 352s-79.9-13.2-111.3-35.5zM176 448c-8.8 0-16 7.2-16 16v48h32V464c0-8.8-7.2-16-16-16zm96 32a16 16 0 1 0 0-32 16 16 0 1 0 0 32z"/></svg></a>

	<div class="container">
		<div class="form-wrapper">
			<form id="signup-form" class="form">
				<h2>Sign Up</h2>

				<div class="form-control">
					<label for="username"><span>Username</span></label>
					<input type="text" id="username" name="username"
					       placeholder="Enter your username" required
					       pattern="^[a-zA-Z0-9_-]{3,16}$" autocomplete="username">
					<small class="error-text"></small>
				</div>

				<div class="form-control">
					<label for="email"><span>Email</span></label>
					<input type="email" id="email" name="email"
					       placeholder="Enter your email" required autocomplete="email">
					<small class="error-text"></small>
				</div>

				<div class="form-control">
					<label for="password"><span>Password</span></label>
					<div class="pw-wrapper">
						<input type="password" id="password" name="password"
						       placeholder="Enter your password" required autocomplete="new-password">
						<button type="button" class="pw-toggle" aria-label="Toggle password visibility">
							<svg viewBox="0 0 576 512" class="eye-icon eye-off"><path fill="currentColor" d="M288 32c-80.8 0-145.5 36.8-192.6 80.6C48.6 156 17.3 208 2.5 243.7c-3.3 7.9-3.3 16.7 0 24.6C17.3 304 48.6 356 95.4 399.4C142.5 443.2 207.2 480 288 480s145.5-36.8 192.6-80.6c46.8-43.4 78.1-95.4 92.9-131.1c3.3-7.9 3.3-16.7 0-24.6C558.7 208 527.4 156 480.6 112.6C433.5 68.8 368.8 32 288 32zM144 256a144 144 0 1 1 288 0 144 144 0 1 1 -288 0zm144-64c0 35.3-28.7 64-64 64c-7.1 0-13.9-1.2-20.3-3.3C204.4 262.4 208 259.6 208 256c0-26.5-21.5-48-48-48c-3.6 0-6.4 3.6-6.7 4.3C151.2 205.9 150 199.1 150 192c0-35.3 28.7-64 64-64s64 28.7 64 64z"/></svg>
						</button>
					</div>
					<div id="password-strength"></div>
					<small class="error-text"></small>
				</div>

				<div class="form-control">
					<label for="confirm-password"><span>Confirm Password</span></label>
					<div class="pw-wrapper">
						<input type="password" id="confirm-password" name="confirm-password"
						       placeholder="Confirm your password" required autocomplete="new-password">
						<button type="button" class="pw-toggle" aria-label="Toggle password visibility">
							<svg viewBox="0 0 576 512" class="eye-icon eye-off"><path fill="currentColor" d="M288 32c-80.8 0-145.5 36.8-192.6 80.6C48.6 156 17.3 208 2.5 243.7c-3.3 7.9-3.3 16.7 0 24.6C17.3 304 48.6 356 95.4 399.4C142.5 443.2 207.2 480 288 480s145.5-36.8 192.6-80.6c46.8-43.4 78.1-95.4 92.9-131.1c3.3-7.9 3.3-16.7 0-24.6C558.7 208 527.4 156 480.6 112.6C433.5 68.8 368.8 32 288 32zM144 256a144 144 0 1 1 288 0 144 144 0 1 1 -288 0zm144-64c0 35.3-28.7 64-64 64c-7.1 0-13.9-1.2-20.3-3.3C204.4 262.4 208 259.6 208 256c0-26.5-21.5-48-48-48c-3.6 0-6.4 3.6-6.7 4.3C151.2 205.9 150 199.1 150 192c0-35.3 28.7-64 64-64s64 28.7 64 64z"/></svg>
						</button>
					</div>
					<div id="password-match"></div>
					<small class="error-text"></small>
				</div>

				<div id="signup-error" class="alert-error" role="alert" hidden></div>

				<button type="submit" id="signup-btn">Sign Up</button>
				<p>Already have an account? <a href="./login.html">Login</a></p>
			</form>
		</div>
	</div>

	<script src="script.js" defer></script>
</body>
</html>
